  <style>
    body {
      margin: 0;
      font-family: poppins, sans-serif;
    
    }

    .navbar {
      background-color: #f6f090;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 30px;
      height: 80px;
      position: relative;
      z-index: 1000px;
    }

    .logo {
      color: #653a31;
      font-size: 22px;
      font-weight: 500;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    button {
      padding: 6px 12px;
      border: none;
      background-color: #f6f090;
    }

    svg {
      height: 40px;
      padding-left:60px ;
      width: 40px;
    }
     #check {
        display: none;
      }

      .open {
        font-size: 25px;
        padding: 10px;
        cursor: pointer;
        position: relative;
      }

      .sidebar {
        position: fixed;
        top: 80px;
        right: -100%;
        width: 900px;
        height: 100%;
        background: #6b3b2e;
        transition: 0.3s;
      }

      .sidebar a {
        display: block;
        color: #f5e6a8;
        font-size: 25px;
        margin-top: 40px;
        text-align: start;
        padding-left:  150px;
        text-decoration: none;
        
      }

      .close {
        position: absolute;
        bottom:  0px;
    
        padding-left: 100px;
        justify-content: start;
        font-size: 30px;
        cursor: pointer;
        color: #f5e6a8;
      }
      #check:checked ~ .sidebar {
        right: 0;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="logo">Ramen Haven</div>

      <div class="menu">
