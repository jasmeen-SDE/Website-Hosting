<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        color: #653a31;
      }
      .footer {
        background: #f6f090;
        padding-top: 60px;
        padding-left: 80px;
      }

      .footer-top-section {
        display: flex;
        justify-content: space-between;
      }
      .footer h1 {
        font-weight: 100;
      }
      .left h1 {
        color: #653a31;
        font-weight: 100;
      }
      .right {
        width: 300px;
        margin-right: 250px;
      }

      .p2 {
        margin-bottom: 15px;
      }
      .link p {
        margin-top: 5px;
      }
      .copy {
        margin-top: 50px;
        padding-bottom: 50px;
        font-size: 18px;
      }
      .icons {
        margin-bottom: 40px;
        margin-right: 10px;
        gap: 70px;
      }
      .border {
        border: none;
        border-bottom: 1px solid #653a31;
        padding: 15px;

      }
    </style>
  </head>
  <body>
    <footer class="footer">
      <div class="footer-top-section">
        <div>
          <h1>Ramen Haven</h1>
        </div>

        <div class="right">
          <div class="p2">
            <p>123-456-7890</p>
            <p>info@mysite.com</p>
            <p style="margin-top: 20px; margin-bottom: 50px">
              500 Terry Francine St. San Francisco, CA
            </p>
          </div>
          <div class="icons">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-facebook-f"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-tiktok"></i>
          </div>
          <div class="links">
            <p>Privacy Policy</p>
            <p>Accessibility Statement</p>
            <p>Terms & Conditions</p>
            <p>Refund Policy</p>
          </div>
        </div>
      </div>
      <div class="border"></div>
      <p class="copy">© 2035 by Ramen Haven. Powered by Wix</p>
    </footer>
  </body>
</html>
